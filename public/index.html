<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proprietati ImmoFlux</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F2;--sur:#fff;--sur2:#F0EDE8;--brd:#E2DDD8;--tx:#1A1714;--tx2:#6B6460;--tx3:#9E9894;--acc:#C8440A;--acc-l:#FDF0EB;--grn:#2D6A4F;--grn-l:#EAF4EE;--amb:#92620B;--amb-l:#FEF6E4;--blu:#1D4ED8;--blu-l:#EFF6FF;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{background:var(--sur);border-bottom:1px solid var(--brd);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
.logo{font-family:'DM Serif Display',serif;font-size:21px}.logo span{color:var(--acc)}
.hright{display:flex;align-items:center;gap:12px}
.lupd{font-size:12px;color:var(--tx3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);border:1px solid var(--brd);background:transparent;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;height:34px;white-space:nowrap}
.btn:hover{background:var(--sur2)}.btn:disabled{opacity:.5;cursor:default}
.spin{display:inline-block;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.wrap{max-width:1400px;margin:0 auto;padding:1.5rem 2rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.sc{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px}
.sc-l{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:5px}
.sc-v{font-size:24px;font-weight:300;color:var(--tx);font-family:'DM Serif Display',serif}
.fbar{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:12px 16px;margin-bottom:1.25rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbar select,.fbar input{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--bg);color:var(--tx);height:34px;outline:none;min-width:0}
.fbar select:focus,.fbar input:focus{border-color:var(--tx3)}
.fbar input[type=text]{flex:1;min-width:180px}
.fl{font-size:12px;color:var(--tx3);font-weight:500;white-space:nowrap}
.ag-progress{background:var(--amb-l);border:1px solid #E9C46A;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--amb);margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pbw{flex:1;min-width:100px;height:6px;background:#E9C46A44;border-radius:3px;overflow:hidden}
.pbb{height:100%;background:var(--amb);border-radius:3px;transition:width .15s}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.07);border-color:var(--tx3)}
.ciw{position:relative;height:195px;overflow:hidden;background:var(--sur2)}
.cimg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .cimg{transform:scale(1.04)}
.cnp{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:12px}
.ic{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px}
.txb{position:absolute;top:9px;left:9px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.txv{background:var(--acc);color:#fff}.txi{background:var(--blu);color:#fff}
.cb{padding:12px 14px}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:7px}
.ctitle{font-size:13px;font-weight:500;line-height:1.4;color:var(--tx);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.s1{background:#2D6A4F}.s2{background:#92620B}.s3{background:var(--acc)}.s4,.s5{background:#9E9894}
.cprice{font-family:'DM Serif Display',serif;font-size:19px;color:var(--tx);margin-bottom:9px}
.cprice small{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--tx3);font-weight:400}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.chip{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--sur2);color:var(--tx2)}
.cloc{font-size:12px;color:var(--tx3)}.cag{font-size:11px;color:var(--tx3);margin-top:4px}
.pgn{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:1.5rem;flex-wrap:wrap}
.pb{font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 12px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--sur);color:var(--tx);cursor:pointer;height:32px;transition:all .12s}
.pb:hover:not(:disabled){background:var(--sur2)}
.pb.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.pb:disabled{opacity:.4;cursor:default}
.pi{font-size:12px;color:var(--tx3);margin:0 4px}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx3);font-size:14px}
.err{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--rs);padding:11px 14px;font-size:13px;color:#991B1B;margin-bottom:1.25rem}
.skel{background:linear-gradient(90deg,var(--sur2) 25%,var(--brd) 50%,var(--sur2) 75%);background-size:200% 100%;animation:shim 1.2s infinite;border-radius:var(--rs)}
@keyframes shim{to{background-position:-200% 0}}
.skelcard{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.overlay{position:fixed;inset:0;background:rgba(15,10,5,.6);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(3px)}
.modal{background:var(--sur);border-radius:var(--r);border:1px solid var(--brd);max-width:700px;width:100%;margin:auto;position:relative;animation:fu .18s ease}
@keyframes fu{from{opacity:0;transform:translateY(10px)}}
.mx{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;border:1px solid var(--brd);background:var(--sur);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--tx2);z-index:5}
.mx:hover{background:var(--sur2);color:var(--tx)}
.gal{position:relative;height:250px;overflow:hidden;background:var(--sur2)}
.galslide{display:flex;height:100%;transition:transform .28s ease}
.galslide img{width:100%;height:100%;object-fit:cover;flex-shrink:0}
.galb{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.88);border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.galprev{left:9px}.galnext{right:9px}
.galcnt{position:absolute;bottom:9px;right:11px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px}
.nogal{height:250px;display:flex;align-items:center;justify-content:center;color:var(--tx3);font-size:13px;background:var(--sur2)}
.mc{padding:20px 22px}
.mbadges{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap}
.mb{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.mbg{background:var(--grn-l);color:var(--grn)}.mba{background:var(--amb-l);color:var(--amb)}
.mbr{background:#FEF2F2;color:#991B1B}.mbgr{background:var(--sur2);color:var(--tx3)}
.mbac{background:var(--acc-l);color:var(--acc)}.mbb{background:var(--blu-l);color:var(--blu)}
.mtitle{font-family:'DM Serif Display',serif;font-size:21px;color:var(--tx);margin-bottom:3px;line-height:1.3}
.mloc{font-size:12px;color:var(--tx3);margin-bottom:12px}
.mprice{font-family:'DM Serif Display',serif;font-size:26px;color:var(--tx);margin-bottom:16px}
.mprice small{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--tx3)}
.stitle{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--brd)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin-bottom:16px}
.di .dl{font-size:11px;color:var(--tx3);margin-bottom:1px}.di .dv{font-size:13px;font-weight:500;color:var(--tx)}
.desc{font-size:13px;color:var(--tx2);line-height:1.7;max-height:110px;overflow-y:auto;margin-bottom:14px}
.mlinks{display:flex;gap:10px;flex-wrap:wrap}
.mlink{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--acc);text-decoration:none;padding:6px 13px;border:1px solid var(--acc);border-radius:var(--rs)}
.mlink:hover{background:var(--acc-l)}
@media(max-width:600px){.wrap{padding:1rem}header{padding:0 1rem}.dgrid{grid-template-columns:1fr}.mc{padding:14px}}
</style>
</head>
<body>
<header>
  <div class="logo">Immo<span>Flux</span></div>
  <div class="hright">
    <span class="lupd" id="lupd"></span>
    <button class="btn" id="btnref" onclick="resetToAll()"><span id="ri">&#8635;</span> Toate</button>
  </div>
</header>
<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="fbar">
    <span class="fl">Filtre:</span>
    <select id="f-ag" onchange="onAgentChange()">
      <option value="">Toti agentii</option>
    </select>
    <select id="f-tx" onchange="applyLocalF()">
      <option value="">Toate tipurile</option>
      <option value="1">Vanzare</option>
      <option value="2">Inchiriere</option>
    </select>
    <select id="f-cat" onchange="applyLocalF()">
      <option value="">Toate categoriile</option>
      <option value="1">Apartament</option>
      <option value="2">Casa / Vila</option>
      <option value="3">Teren</option>
      <option value="4">Birou</option>
      <option value="5">Comercial</option>
      <option value="6">Industrial</option>
    </select>
    <select id="f-st" onchange="applyLocalF()">
      <option value="">Toate statusurile</option>
      <option value="1">Activa</option>
      <option value="2">Asteptare</option>
      <option value="3">Tranzactionata</option>
      <option value="4">Pierduta</option>
      <option value="5">Retrasa</option>
    </select>
    <input id="f-q" type="text" placeholder="Cauta titlu, adresa, zona...">
  </div>
  <div id="progressarea"></div>
  <div id="errarea"></div>
  <div id="mainarea"></div>
  <div class="pgn" id="pgn"></div>
</div>
<div id="mroot"></div>
<script>
const TOKEN='596a96cc7bf9108cd896f33c44aedc8a';
const RENET='https://renet.immoflux.ro/api/v1';

// Auto-detect: if running on Vercel use /api/proxy, else use corsproxy.io
const IS_VERCEL = window.location.hostname.includes('vercel.app') || 
                  window.location.hostname.includes('vercel.com') ||
                  (window.location.hostname !== 'localhost' && 
                   window.location.hostname !== '' &&
                   window.location.protocol !== 'file:');

const CAT={1:'Apartament',2:'Casa/Vila',3:'Teren',4:'Birou',5:'Comercial',6:'Industrial'};
const TX={1:'Vanzare',2:'Inchiriere'};
const ST={1:'Activa',2:'Asteptare',3:'Tranzactionata',4:'Pierduta',5:'Retrasa'};
const FL={2:'Demisol',3:'Parter',10:'Et.1',20:'Et.2',30:'Et.3',40:'Et.4',50:'Et.5',60:'Et.6',70:'Et.7',80:'Et.8',90:'Et.9',100:'Et.10',110:'Et.11',120:'Et.12',1000:'Mansarda'};
const PT={1:'Decomandat',2:'Semidecomandat',3:'Nedecomandat',4:'Circular',5:'Vagon',6:'Comandat',7:'Duplex'};
const FU={1:'Mobilat',2:'Semimobilat',3:'Nemobilat',4:'Lux'};
const CO={1:'Confort 1',2:'Confort 2',3:'Confort 3',4:'Lux'};

let pageData=[],agentData=[],displayData=[];
let curPage=1,lastPage=1,total=0;
let agentsMap={};
let mode='normal';
let aborted=false;
let galIdx=0,galImgs=[];

function fmtP(p,c){
  if(!p)return'—';
  const v=Number(p).toLocaleString('ro-RO');
  return c===2?v+' RON':({1:'€',3:'$',4:'CHF'}[c]||'€')+v;
}
function flL(f){return FL[f]||(f?'Et.'+Math.round(f/10):'—')}
function stripH(s){return s?(s+'').replace(/<[^>]+>/g,'').replace(/&[a-zA-Z#0-9]+;/g,' ').replace(/\s+/g,' ').trim():''}
function stCls(s){return{1:'mbg',2:'mba',3:'mbr',4:'mbgr',5:'mbgr'}[s]||'mbgr'}

async function apiFetch(path, params){
  const qs=new URLSearchParams({token:TOKEN,...(params||{})}).toString();
  const directUrl=RENET+'/'+path+'?'+qs;
  
  // 1. Try Vercel proxy (works when deployed on Vercel)
  if(IS_VERCEL){
    try{
      const r=await fetch('/api/proxy?path='+path+'?'+qs);
      if(r.ok) return r.json();
    }catch(e){}
  }
  
  // 2. Try direct (works if renet adds CORS headers in future)
  try{
    const r=await fetch(directUrl);
    if(r.ok) return r.json();
  }catch(e){}
  
  // 3. corsproxy.io - works in browsers (adds CORS headers server-side)
  try{
    const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(directUrl));
    if(r.ok) return r.json();
  }catch(e){}
  
  // 4. allorigins
  try{
    const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(directUrl));
    if(r.ok){
      const txt=await r.text();
      return JSON.parse(txt);
    }
  }catch(e){}
  
  throw new Error('Nu s-a putut accesa API-ul. Incearca din alt browser sau retea.');
}

async function loadAgents(){
  try{
    const d=await apiFetch('agents');
    const list=Array.isArray(d)?d:(d.data||[]);
    list.forEach(a=>{agentsMap[a.id]=a;});
    const sel=document.getElementById('f-ag');
    while(sel.options.length>1)sel.remove(1);
    list.sort((a,b)=>agN(a).localeCompare(agN(b),'ro')).forEach(a=>{
      const o=document.createElement('option');
      o.value=a.id; o.textContent=agN(a);
      sel.appendChild(o);
    });
  }catch(e){console.warn('Agents load failed:',e);}
}

function agN(a){
  if(!a)return'—';
  return((a.first_name||'')+' '+(a.last_name||'')).trim()||a.name||a.email||'Agent '+a.id;
}
function agName(id){
  if(!id)return null;
  const a=agentsMap[id];
  return a?agN(a):'Agent '+id;
}

function setLoad(on){
  const b=document.getElementById('btnref'),r=document.getElementById('ri');
  b.disabled=on; on?r.classList.add('spin'):r.classList.remove('spin');
}
function showSkel(){
  document.getElementById('mainarea').innerHTML='<div class="grid">'+Array(9).fill(
    '<div class="skelcard"><div class="skel" style="height:195px;border-radius:0"></div>'+
    '<div style="padding:12px 14px"><div class="skel" style="height:13px;width:75%;margin-bottom:8px"></div>'+
    '<div class="skel" style="height:19px;width:45%;margin-bottom:10px"></div>'+
    '<div class="skel" style="height:12px;width:60%"></div></div></div>').join('')+'</div>';
}
function resetF(){['f-tx','f-cat','f-st','f-q'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';})}

async function loadPage(page){
  mode='normal'; agentData=[]; aborted=false;
  setLoad(true);
  document.getElementById('errarea').innerHTML='';
  document.getElementById('progressarea').innerHTML='';
  showSkel();
  try{
    const d=await apiFetch('properties/',{page});
    if(!d||!d.data) throw new Error('Raspuns invalid');
    pageData=d.data||[]; lastPage=d.last_page||1; total=d.total||0; curPage=page;
    document.getElementById('lupd').textContent='Actualizat '+new Date().toLocaleTimeString('ro-RO');
    // Add agents from this page if not yet loaded from API
    pageData.forEach(p=>{if(p.agent_id&&!agentsMap[p.agent_id])agentsMap[p.agent_id]={id:p.agent_id};});
    resetF();
    displayData=[...pageData];
    renderStats(); renderGrid(displayData); renderPgn();
  }catch(e){
    document.getElementById('errarea').innerHTML='<div class="err">&#9888; '+e.message+'</div>';
    document.getElementById('mainarea').innerHTML='';
  }finally{setLoad(false);}
}

async function loadAllForAgent(agId){
  mode='agent'; pageData=[]; agentData=[]; aborted=false;
  setLoad(true);
  document.getElementById('errarea').innerHTML='';
  showSkel();
  try{
    const first=await apiFetch('properties/',{page:1});
    if(!first||!first.data) throw new Error('Raspuns invalid');
    const tp=first.last_page||1;
    total=first.total||0;
    first.data.forEach(p=>{if(String(p.agent_id)===String(agId))agentData.push(p);});
    showProg(1,tp,agentData.length);

    const BATCH=20;
    for(let s=2;s<=tp&&!aborted;s+=BATCH){
      const pages=[];
      for(let p=s;p<s+BATCH&&p<=tp;p++) pages.push(p);
      const res=await Promise.all(pages.map(p=>apiFetch('properties/',{page:p}).catch(()=>null)));
      res.forEach(r=>{if(r&&r.data)r.data.forEach(p=>{if(String(p.agent_id)===String(agId))agentData.push(p);});});
      showProg(Math.min(s+BATCH-1,tp),tp,agentData.length);
    }
    document.getElementById('progressarea').innerHTML='';
    document.getElementById('lupd').textContent=(agName(agId)||'Agent '+agId)+' · '+agentData.length+' proprietati · '+new Date().toLocaleTimeString('ro-RO');
    resetF();
    displayData=[...agentData];
    renderStats(); renderGrid(displayData);
    document.getElementById('pgn').innerHTML='';
  }catch(e){
    document.getElementById('errarea').innerHTML='<div class="err">&#9888; '+e.message+'</div>';
    document.getElementById('mainarea').innerHTML='';
    document.getElementById('progressarea').innerHTML='';
  }finally{setLoad(false);}
}

function showProg(done,tot,found){
  const pct=Math.round(done/tot*100);
  document.getElementById('progressarea').innerHTML=
    '<div class="ag-progress"><span class="spin">&#8635;</span>'+
    '<span>Cautare... <strong>'+done+'/'+tot+'</strong> pagini &middot; gasit: <strong>'+found+'</strong></span>'+
    '<div class="pbw"><div class="pbb" style="width:'+pct+'%"></div></div>'+
    '<button class="btn" onclick="cancelSearch()" style="height:28px;padding:4px 10px;font-size:12px">Anuleaza</button></div>';
}
function cancelSearch(){aborted=true;document.getElementById('progressarea').innerHTML='';document.getElementById('f-ag').value='';loadPage(curPage);}
function resetToAll(){aborted=true;document.getElementById('f-ag').value='';document.getElementById('progressarea').innerHTML='';loadPage(1);}
function onAgentChange(){const v=document.getElementById('f-ag').value;if(!v)resetToAll();else loadAllForAgent(v);}

function applyLocalF(){
  const tx=document.getElementById('f-tx').value;
  const cat=document.getElementById('f-cat').value;
  const st=document.getElementById('f-st').value;
  const q=document.getElementById('f-q').value.toLowerCase();
  const src=mode==='agent'?agentData:pageData;
  displayData=src.filter(p=>{
    if(tx&&p.transaction_id!=tx)return false;
    if(cat&&p.category_id!=cat)return false;
    if(st&&p.status!=st)return false;
    if(q){
      const t=((p.title&&p.title.ro)||'').toLowerCase();
      const a=(p.address||'').toLowerCase();
      const z=(p.zone&&p.zone.name||'').toLowerCase();
      if(!t.includes(q)&&!a.includes(q)&&!z.includes(q))return false;
    }
    return true;
  });
  renderGrid(displayData);
}
document.getElementById('f-q').addEventListener('input',applyLocalF);

function renderStats(){
  const src=mode==='agent'?agentData:pageData;
  const active=src.filter(p=>p.status===1).length;
  const vanz=src.filter(p=>p.transaction_id===1).length;
  const inch=src.filter(p=>p.transaction_id===2).length;
  const tranz=src.filter(p=>p.status===3).length;
  const cards=mode==='agent'
    ?[['Proprietati agent',agentData.length],['Active',active],['Vanzare',vanz],['Inchiriere',inch],['Tranzactionate',tranz]]
    :[['Total sistem',total.toLocaleString('ro-RO')],['Active (pag.)',active],['Vanzare',vanz],['Inchiriere',inch],['Tranzactionate',tranz],['Pagina',curPage+'/'+lastPage]];
  document.getElementById('stats').innerHTML=cards.map(([l,v])=>
    '<div class="sc"><div class="sc-l">'+l+'</div><div class="sc-v">'+v+'</div></div>').join('');
}

function renderGrid(data){
  if(!data.length){document.getElementById('mainarea').innerHTML='<div class="empty">Nicio proprietate gasita.</div>';return;}
  document.getElementById('mainarea').innerHTML='<div class="grid">'+data.map(cardHTML).join('')+'</div>';
}

function cardHTML(p){
  const title=(p.title&&p.title.ro)?p.title.ro:(CAT[p.category_id]||'Proprietate');
  const imgSrc=p.images&&p.images.length?p.images[0]:null;
  const imgEl=imgSrc
    ?'<img class="cimg" src="'+imgSrc+'" loading="lazy" onerror="this.outerHTML=\'<div class=cnp>Fara poza</div>\'">'
    :'<div class="cnp">Fara poza</div>';
  const ic=p.images&&p.images.length>1?'<div class="ic">'+p.images.length+' foto</div>':'';
  const txb=p.transaction_id?'<div class="txb '+(p.transaction_id===1?'txv':'txi')+'">'+(TX[p.transaction_id]||'')+'</div>':'';
  const chips=[];
  if(p.rooms)chips.push(p.rooms+' cam.');
  if(p.surface_size)chips.push(p.surface_size+' mp');
  if(p.floor)chips.push(flL(p.floor));
  if(p.built_year)chips.push(p.built_year);
  const loc=[p.address,p.address_nr,p.zone&&p.zone.name].filter(Boolean).join(' · ');
  const ag=agName(p.agent_id);
  return '<div class="card" onclick="openModal('+p.id+')">'
    +'<div class="ciw">'+imgEl+ic+txb+'</div>'
    +'<div class="cb">'
    +'<div class="ctop"><div class="ctitle">'+title+'</div><div class="sdot s'+(p.status||5)+'" title="'+(ST[p.status]||'')+'"></div></div>'
    +'<div class="cprice">'+fmtP(p.price,p.price_currency)+(p.transaction_id===2?'<small> / luna</small>':'')+'</div>'
    +'<div class="chips">'+chips.map(c=>'<span class="chip">'+c+'</span>').join('')+'</div>'
    +'<div class="cloc">'+(loc||'—')+'</div>'
    +(ag?'<div class="cag">'+ag+'</div>':'')
    +'</div></div>';
}

function renderPgn(){
  const pg=document.getElementById('pgn');
  if(mode==='agent'||lastPage<=1){pg.innerHTML='';return;}
  let h='<button class="pb" onclick="loadPage('+(curPage-1)+')" '+(curPage<=1?'disabled':'')+'>&#8592;</button>';
  let s=Math.max(1,curPage-2),e=Math.min(lastPage,curPage+2);
  if(s>1)h+='<button class="pb" onclick="loadPage(1)">1</button>'+(s>2?'<span class="pi">...</span>':'');
  for(let i=s;i<=e;i++)h+='<button class="pb '+(i===curPage?'active':'')+'" onclick="loadPage('+i+')">'+i+'</button>';
  if(e<lastPage)h+=(e<lastPage-1?'<span class="pi">...</span>':'')+'<button class="pb" onclick="loadPage('+lastPage+')">'+lastPage+'</button>';
  h+='<button class="pb" onclick="loadPage('+(curPage+1)+')" '+(curPage>=lastPage?'disabled':'')+'>&#8594;</button>';
  h+='<span class="pi">'+curPage+' / '+lastPage+'</span>';
  pg.innerHTML=h;
}

function findP(id){return(mode==='agent'?agentData:pageData).find(x=>x.id===id);}

function openModal(id){
  const p=findP(id);if(!p)return;
  galImgs=p.images||[];galIdx=0;
  const title=(p.title&&p.title.ro)?p.title.ro:(CAT[p.category_id]||'Proprietate');
  const desc=stripH(p.description&&p.description.ro?p.description.ro:'');
  const loc=[p.address,p.address_nr,p.city&&p.city.name,p.zone&&p.zone.name].filter(Boolean).join(' · ');
  const ag=agName(p.agent_id);
  const galHTML=galImgs.length
    ?'<div class="gal"><div class="galslide" id="gslide">'+galImgs.map(u=>'<img src="'+u+'" loading="lazy">').join('')+'</div>'
      +(galImgs.length>1?'<button class="galb galprev" onclick="galMove(-1)">&#8249;</button><button class="galb galnext" onclick="galMove(1)">&#8250;</button>':'')
      +'<div class="galcnt" id="gcnt">1 / '+galImgs.length+'</div></div>'
    :'<div class="nogal">Fara imagini</div>';
  const badges=[
    ST[p.status]?'<span class="mb '+stCls(p.status)+'">'+ST[p.status]+'</span>':'',
    TX[p.transaction_id]?'<span class="mb '+(p.transaction_id===1?'mbac':'mbb')+'">'+TX[p.transaction_id]+'</span>':'',
    CAT[p.category_id]?'<span class="mb mbgr">'+CAT[p.category_id]+'</span>':'',
    p.exclusivity===1?'<span class="mb mba">Exclusivitate</span>':'',
    ag?'<span class="mb mbgr">'+ag+'</span>':'',
  ].filter(Boolean).join('');
  const fields=[
    ['Camere',p.rooms||'—'],['Bai',p.bathrooms||'—'],
    ['Suprafata utila',p.surface_size?p.surface_size+' mp':'—'],
    ['Suprafata totala',p.surface_total?p.surface_total+' mp':'—'],
    ['Etaj',flL(p.floor)],['Nr. etaje',p.building_levels||'—'],
    ['An constructie',p.built_year||'—'],['An renovare',p.renovation_year||'—'],
    ['Compartimentare',PT[p.partitioning]||'—'],['Mobilare',FU[p.furniture]||'—'],
    ['Confort',CO[p.confort]||'—'],['Disponibilitate',p.disponibility||'—'],
    ['Clasa energetica',p.eficienta_energetica||'—'],['Teren',p.land_size?p.land_size+' mp':'—'],
    ['Referinta',p.ref||'—'],['ID',p.id],
  ].map(([l,v])=>'<div class="di"><div class="dl">'+l+'</div><div class="dv">'+v+'</div></div>').join('');
  const links=[
    p.virtual_tour?'<a class="mlink" href="'+p.virtual_tour+'" target="_blank">Tur virtual</a>':'',
    p.video_code?'<a class="mlink" href="'+p.video_code+'" target="_blank">Video</a>':'',
  ].filter(Boolean).join('');
  document.getElementById('mroot').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal"><button class="mx" onclick="closeModal()">&#10005;</button>'
    +galHTML+'<div class="mc">'
    +'<div class="mbadges">'+badges+'</div>'
    +'<div class="mtitle">'+title+'</div>'
    +(loc?'<div class="mloc">'+loc+'</div>':'')
    +'<div class="mprice">'+fmtP(p.price,p.price_currency)+(p.transaction_id===2?'<small> / luna</small>':'')+(p.plus_vat?'<small> + TVA</small>':'')+'</div>'
    +'<div class="stitle">Detalii</div><div class="dgrid">'+fields+'</div>'
    +(desc?'<div class="stitle">Descriere</div><div class="desc">'+desc+'</div>':'')
    +(links?'<div class="mlinks">'+links+'</div>':'')
    +'</div></div></div>';
  document.body.style.overflow='hidden';
}
function galMove(dir){
  galIdx=(galIdx+dir+galImgs.length)%galImgs.length;
  const el=document.getElementById('gslide');
  if(el)el.style.transform='translateX(-'+galIdx*100+'%)';
  const c=document.getElementById('gcnt');
  if(c)c.textContent=(galIdx+1)+' / '+galImgs.length;
}
function closeModal(){document.getElementById('mroot').innerHTML='';document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

loadAgents();
loadPage(1);
</script>
</body>
</html>
