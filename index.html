<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mexicano Padel Tournament</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f5;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --muted: #6b6b66;
    --hint: #999992;
    --green-bg: #eaf3de;
    --green-text: #3b6d11;
    --green-border: #639922;
    --blue-bg: #e6f1fb;
    --blue-text: #185fa5;
    --blue-border: #378add;
    --amber-bg: #faeeda;
    --amber-text: #854f0b;
    --amber-border: #ef9f27;
    --coral-bg: #faece7;
    --coral-text: #993c1d;
    --coral-border: #d85a30;
    --purple-bg: #eeedfe;
    --purple-text: #3c3489;
    --purple-border: #7f77dd;
    --radius: 10px;
    --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #252523;
      --border: rgba(255,255,255,0.1);
      --border-md: rgba(255,255,255,0.2);
      --text: #f0ede8;
      --muted: #a0a09a;
      --hint: #666660;
      --green-bg: #173404;
      --green-text: #c0dd97;
      --green-border: #3b6d11;
      --blue-bg: #042c53;
      --blue-text: #b5d4f4;
      --blue-border: #185fa5;
      --amber-bg: #412402;
      --amber-text: #fac775;
      --amber-border: #854f0b;
      --coral-bg: #4a1b0c;
      --coral-text: #f5c4b3;
      --coral-border: #993c1d;
      --purple-bg: #26215c;
      --purple-text: #cecbf6;
      --purple-border: #534ab7;
    }
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 1.6rem; font-weight: 500; }
  .header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-coral { background: var(--coral-bg); color: var(--coral-text); }
  .badge-purple { background: var(--purple-bg); color: var(--purple-text); }
  .tabs { display: flex; gap: 4px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 1.5rem; }
  .tab { flex: 1; padding: 8px 12px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s, color 0.15s; }
  .tab.active { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); }
  .tab:hover:not(.active) { background: var(--bg); color: var(--text); }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--muted); margin-bottom: 1rem; letter-spacing: 0.03em; }
  .row { display: flex; gap: 8px; align-items: center; }
  input[type="text"], input[type="number"], select {
    width: 100%; padding: 8px 12px; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--blue-border); }
  button {
    padding: 8px 18px; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--bg); }
  button.primary { background: var(--text); color: var(--surface); border-color: var(--text); }
  button.primary:hover { opacity: 0.85; }
  button.danger { color: var(--coral-text); border-color: var(--coral-border); }
  button.danger:hover { background: var(--coral-bg); }
  button.small { padding: 4px 12px; font-size: 12px; }
  .player-list { display: flex; flex-direction: column; gap: 6px; }
  .player-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg); border-radius: var(--radius-sm); border: 0.5px solid var(--border); }
  .player-name { font-size: 14px; font-weight: 500; }
  .player-seed { font-size: 12px; color: var(--hint); margin-left: 6px; }
  .info-box { background: var(--blue-bg); border: 0.5px solid var(--blue-border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--blue-text); margin-bottom: 1rem; }
  .warn-box { background: var(--amber-bg); border: 0.5px solid var(--amber-border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--amber-text); margin-bottom: 1rem; }
  .round-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .round-title { font-size: 16px; font-weight: 500; }
  .match-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
  .match-court { font-size: 11px; color: var(--hint); font-weight: 500; letter-spacing: 0.05em; margin-bottom: 8px; }
  .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .team { text-align: center; }
  .team-players { font-size: 13px; font-weight: 500; line-height: 1.5; }
  .team-score { font-size: 22px; font-weight: 500; color: var(--text); }
  .vs { font-size: 13px; color: var(--hint); text-align: center; }
  .score-inputs { display: flex; gap: 8px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
  .score-inputs input { width: 60px; text-align: center; }
  .score-inputs span { color: var(--muted); font-size: 13px; flex: 1; text-align: center; }
  .score-done { font-size: 12px; padding: 4px 10px; }
  .leaderboard-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .leaderboard-table th { font-size: 11px; font-weight: 500; color: var(--hint); letter-spacing: 0.05em; text-align: left; padding: 6px 10px; border-bottom: 0.5px solid var(--border); }
  .leaderboard-table td { padding: 10px 10px; border-bottom: 0.5px solid var(--border); }
  .leaderboard-table tr:last-child td { border-bottom: none; }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; font-size: 12px; font-weight: 500; }
  .rank-1 { background: var(--amber-bg); color: var(--amber-text); }
  .rank-2 { background: var(--bg); color: var(--muted); border: 0.5px solid var(--border); }
  .rank-3 { background: var(--coral-bg); color: var(--coral-text); }
  .rank-n { background: var(--bg); color: var(--hint); border: 0.5px solid var(--border); font-size: 11px; }
  .score-total { font-size: 16px; font-weight: 500; }
  .score-history { font-size: 12px; color: var(--hint); }
  .settings-row { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .settings-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .settings-row select, .settings-row input[type="number"] { width: 90px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .stat-label { font-size: 11px; color: var(--hint); margin-top: 2px; }
  .empty { color: var(--hint); font-size: 14px; text-align: center; padding: 2rem; }
  .match-winner-team1 .team:first-child .team-score { color: var(--green-text); }
  .match-winner-team2 .team:last-child .team-score { color: var(--green-text); }
  .action-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎾 Mexicano Padel</h1>
    <p>Dynamic tournament — matchups evolve with the leaderboard</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('registration')">Registration</button>
    <button class="tab" onclick="switchTab('rounds')">Rounds</button>
    <button class="tab" onclick="switchTab('leaderboard')">Leaderboard</button>
  </div>

  <div id="tab-registration" class="section active">
    <div class="card">
      <div class="card-title">TOURNAMENT SETTINGS</div>
      <div class="settings-row">
        <label>Points per match:</label>
        <select id="points-setting" onchange="saveSettings()">
          <option value="16">16</option>
          <option value="24" selected>24</option>
          <option value="32">32</option>
        </select>
        <label style="margin-left:16px;">Rounds:</label>
        <input type="number" id="rounds-setting" value="5" min="1" max="20" style="width:70px;" onchange="saveSettings()">
      </div>
    </div>

    <div class="card">
      <div class="card-title">ADD PLAYERS</div>
      <div class="row" style="margin-bottom: 12px;">
        <input type="text" id="player-input" placeholder="Player name" onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="primary" onclick="addPlayer()">Add</button>
      </div>
      <div id="player-error" style="font-size:12px; color:var(--coral-text); min-height:16px; margin-bottom:8px;"></div>
      <div class="action-bar" style="margin-bottom:14px;">
        <button class="small" onclick="addSamplePlayers()">+ Add 8 sample players</button>
        <button class="small danger" onclick="clearPlayers()">Clear all</button>
      </div>
      <div id="player-list" class="player-list"></div>
      <div id="player-count-info" style="font-size:12px; color:var(--hint); margin-top:10px; text-align:right;"></div>
    </div>

    <div id="start-btn-area"></div>
  </div>

  <div id="tab-rounds" class="section">
    <div id="rounds-content"></div>
  </div>

  <div id="tab-leaderboard" class="section">
    <div id="leaderboard-content"></div>
  </div>
</div>

<script>
let state = {
  players: [],
  rounds: [],
  currentRound: 0,
  pointsPerMatch: 24,
  totalRounds: 5,
  started: false
};

function saveSettings() {
  state.pointsPerMatch = parseInt(document.getElementById('points-setting').value);
  state.totalRounds = parseInt(document.getElementById('rounds-setting').value) || 5;
}

function uid() { return Math.random().toString(36).slice(2, 9); }

function addPlayer() {
  const input = document.getElementById('player-input');
  const name = input.value.trim();
  const err = document.getElementById('player-error');
  if (!name) { err.textContent = 'Enter a player name.'; return; }
  if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    err.textContent = 'Player already exists.'; return;
  }
  err.textContent = '';
  state.players.push({ id: uid(), name, scores: [], totalScore: 0 });
  input.value = '';
  input.focus();
  renderRegistration();
}

function removePlayer(id) {
  if (state.started) return;
  state.players = state.players.filter(p => p.id !== id);
  renderRegistration();
}

function clearPlayers() {
  if (state.started) return;
  state.players = [];
  renderRegistration();
}

function addSamplePlayers() {
  if (state.started) return;
  const names = ['Alex','Bruno','Carla','Diana','Emilio','Fatima','Gabriel','Helena'];
  names.forEach(name => {
    if (!state.players.find(p => p.name === name)) {
      state.players.push({ id: uid(), name, scores: [], totalScore: 0 });
    }
  });
  renderRegistration();
}

function renderRegistration() {
  const list = document.getElementById('player-list');
  const count = state.players.length;
  if (count === 0) {
    list.innerHTML = '<div class="empty">No players yet. Add at least 8 to start.</div>';
  } else {
    list.innerHTML = state.players.map((p, i) => `
      <div class="player-item">
        <span>
          <span class="player-name">${escHtml(p.name)}</span>
          <span class="player-seed">#${i+1}</span>
        </span>
        ${!state.started ? `<button class="small danger" onclick="removePlayer('${p.id}')">Remove</button>` : ''}
      </div>`).join('');
  }
  const info = document.getElementById('player-count-info');
  const courts = Math.floor(count / 4);
  const ok = count >= 8 && count % 4 === 0;
  const almost = count >= 8 && count % 4 !== 0;
  info.textContent = count > 0 ? `${count} players · ${courts} courts${almost ? ' (best with multiple of 4)' : ''}` : '';
  const area = document.getElementById('start-btn-area');
  if (!state.started) {
    if (count >= 8) {
      area.innerHTML = `<div class="info-box">Ready to start with ${count} players on ${courts} courts. ${ok ? '' : 'For best results, use 8, 12, 16... players.'}</div>
        <button class="primary" style="width:100%;padding:12px;" onclick="startTournament()">Start Tournament →</button>`;
    } else {
      area.innerHTML = `<div class="warn-box">Add at least ${8 - count} more player${8 - count !== 1 ? 's' : ''} to start (minimum 8).</div>`;
    }
  } else {
    area.innerHTML = `<div class="info-box">Tournament in progress. <strong>${state.rounds.length}</strong> round(s) generated.</div>`;
  }
}

function startTournament() {
  saveSettings();
  state.started = true;
  state.rounds = [];
  state.players.forEach(p => { p.scores = []; p.totalScore = 0; });
  generateRound();
  switchTab('rounds');
  renderRegistration();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getSortedPlayers() {
  return [...state.players].sort((a, b) => b.totalScore - a.totalScore);
}

function generateRound() {
  const roundNum = state.rounds.length + 1;
  let orderedPlayers = roundNum === 1 ? shuffle(state.players) : getSortedPlayers();
  const matches = [];
  for (let i = 0; i < orderedPlayers.length; i += 4) {
    const group = orderedPlayers.slice(i, i + 4);
    if (group.length < 4) break;
    matches.push({
      id: uid(),
      court: Math.floor(i / 4) + 1,
      team1: [group[0].id, group[2].id],
      team2: [group[1].id, group[3].id],
      score1: null, score2: null, locked: false
    });
  }
  state.rounds.push({ id: uid(), num: roundNum, matches, complete: false });
  renderRounds();
  renderLeaderboard();
}

function getPlayer(id) { return state.players.find(p => p.id === id); }
function pname(id) { const p = getPlayer(id); return p ? escHtml(p.name) : '?'; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function submitScore(matchId, roundIdx) {
  const round = state.rounds[roundIdx];
  const match = round.matches.find(m => m.id === matchId);
  const pts = state.pointsPerMatch;
  const s1 = parseInt(document.getElementById(`s1-${matchId}`).value);
  const s2 = parseInt(document.getElementById(`s2-${matchId}`).value);
  if (isNaN(s1) || isNaN(s2)) { alert('Enter valid scores.'); return; }
  if (s1 < 0 || s2 < 0) { alert('Scores must be non-negative.'); return; }
  if (s1 + s2 !== pts) { alert(`Scores must add up to ${pts} (e.g. ${Math.ceil(pts/2)}-${Math.floor(pts/2)}).`); return; }
  match.score1 = s1; match.score2 = s2; match.locked = true;
  match.team1.forEach(pid => { const p = getPlayer(pid); p.scores.push(s1); p.totalScore += s1; });
  match.team2.forEach(pid => { const p = getPlayer(pid); p.scores.push(s2); p.totalScore += s2; });
  if (round.matches.every(m => m.locked)) round.complete = true;
  renderRounds();
  renderLeaderboard();
}

function renderRounds() {
  const div = document.getElementById('rounds-content');
  if (!state.started || state.rounds.length === 0) {
    div.innerHTML = '<div class="empty">Start the tournament from the Registration tab.</div>';
    return;
  }
  const canGenNext = state.rounds[state.rounds.length - 1].complete && state.rounds.length < state.totalRounds;
  const totalComplete = state.rounds.filter(r => r.complete).length;
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${state.rounds.length}</div><div class="stat-label">Rounds played</div></div>
    <div class="stat-card"><div class="stat-val">${state.totalRounds}</div><div class="stat-label">Total rounds</div></div>
    <div class="stat-card"><div class="stat-val">${state.pointsPerMatch}</div><div class="stat-label">Points per match</div></div>
  </div>`;
  if (canGenNext) {
    html += `<div class="info-box" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Round ${state.rounds.length} complete! Next matchups ready.</span>
      <button class="primary small" onclick="generateRound()">Generate round ${state.rounds.length + 1} →</button>
    </div>`;
  }
  if (state.rounds.length >= state.totalRounds && state.rounds[state.rounds.length - 1].complete) {
    html += `<div class="info-box" style="background:var(--green-bg);border-color:var(--green-border);color:var(--green-text);">
      Tournament complete! Check the Leaderboard for final rankings.
    </div>`;
  }
  [...state.rounds].reverse().forEach(round => {
    html += `<div class="card">
      <div class="round-header">
        <span class="round-title">Round ${round.num}</span>
        <span class="badge ${round.num === 1 ? 'badge-purple' : 'badge-blue'}">${round.num === 1 ? 'random draw' : 'leaderboard seeded'}</span>
        ${round.complete ? '<span class="badge badge-green">complete</span>' : ''}
      </div>`;
    round.matches.forEach(match => {
      const done = match.locked;
      const t1wins = done && match.score1 > match.score2;
      const t2wins = done && match.score2 > match.score1;
      html += `<div class="match-card ${t1wins ? 'match-winner-team1' : t2wins ? 'match-winner-team2' : ''}">
        <div class="match-court">COURT ${match.court}</div>
        <div class="match-teams">
          <div class="team">
            <div class="team-players">${pname(match.team1[0])}<br>${pname(match.team1[1])}</div>
            ${done ? `<div class="team-score">${match.score1}</div>` : ''}
          </div>
          <div class="vs">vs</div>
          <div class="team">
            <div class="team-players">${pname(match.team2[0])}<br>${pname(match.team2[1])}</div>
            ${done ? `<div class="team-score">${match.score2}</div>` : ''}
          </div>
        </div>`;
      if (!done) {
        html += `<div class="score-inputs">
          <input type="number" id="s1-${match.id}" min="0" max="${state.pointsPerMatch}" placeholder="0" style="width:60px;text-align:center;">
          <span style="color:var(--hint);font-size:12px;">scores (total = ${state.pointsPerMatch})</span>
          <input type="number" id="s2-${match.id}" min="0" max="${state.pointsPerMatch}" placeholder="0" style="width:60px;text-align:center;">
          <button class="small primary score-done" onclick="submitScore('${match.id}', ${state.rounds.indexOf(round)})">Save</button>
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });
  div.innerHTML = html;
}

function renderLeaderboard() {
  const div = document.getElementById('leaderboard-content');
  if (!state.started) {
    div.innerHTML = '<div class="empty">Start the tournament to see rankings.</div>';
    return;
  }
  const sorted = getSortedPlayers();
  const totalComplete = state.rounds.filter(r => r.complete).length;
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${sorted.length}</div><div class="stat-label">Players</div></div>
    <div class="stat-card"><div class="stat-val">${totalComplete}</div><div class="stat-label">Rounds done</div></div>
    <div class="stat-card"><div class="stat-val">${sorted[0] ? sorted[0].totalScore : 0}</div><div class="stat-label">Top score</div></div>
  </div>
  <div class="card">
    <div class="card-title">STANDINGS</div>
    <table class="leaderboard-table">
      <thead><tr>
        <th>Rank</th><th>Player</th><th>Total</th><th>Per round</th><th>History</th>
      </tr></thead><tbody>`;
  sorted.forEach((p, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
    const avg = p.scores.length > 0 ? (p.totalScore / p.scores.length).toFixed(1) : '-';
    const history = p.scores.map(s => {
      const maxS = state.pointsPerMatch;
      const color = s >= maxS * 0.6 ? 'var(--green-text)' : s <= maxS * 0.4 ? 'var(--coral-text)' : 'var(--muted)';
      return `<span style="color:${color};font-weight:500;">${s}</span>`;
    }).join('<span style="color:var(--hint)"> · </span>');
    html += `<tr>
      <td><span class="rank-badge ${rankClass}">${i+1}</span></td>
      <td style="font-weight:500;">${escHtml(p.name)}</td>
      <td><span class="score-total">${p.totalScore}</span></td>
      <td style="color:var(--muted);font-size:13px;">${avg}</td>
      <td style="font-size:12px;">${history || '<span style="color:var(--hint)">—</span>'}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  if (totalComplete > 0) {
    const leader = sorted[0];
    html += `<div class="card" style="border-color:var(--amber-border);background:var(--amber-bg);">
      <div style="font-size:13px;color:var(--amber-text);">Current leader</div>
      <div style="font-size:20px;font-weight:500;color:var(--amber-text);margin-top:4px;">${escHtml(leader.name)} · ${leader.totalScore} pts</div>
    </div>`;
  }
  div.innerHTML = html;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const tabs = { registration: 0, rounds: 1, leaderboard: 2 };
  document.querySelectorAll('.tab')[tabs[name]].classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'leaderboard') renderLeaderboard();
  if (name === 'rounds') renderRounds();
}

renderRegistration();
</script>
