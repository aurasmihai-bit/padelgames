<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Tournament Manager</title>
<meta name="description" content="Run any padel tournament format online — Mexicano, Americano, Mixicano, King of the Court, Team Americano, Group Championship. Free and easy to use.">
<meta name="keywords" content="mexicano padel, padel tournament, mixicano, king of the court, team americano, group championship, americano padel">
<meta name="author" content="Mexicano Padel">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://mexicanopadel.vercel.app">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mexicanopadel.vercel.app">
<meta property="og:title" content="Padel Tournament Manager — All Formats">
<meta property="og:description" content="Mexicano, Americano, Mixicano, King of the Court, Team Americano, Group Championship. Free padel tournament manager.">
<meta property="og:image" content="https://mexicanopadel.vercel.app/og.svg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="Mexicano Padel">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Padel Tournament Manager — All Formats">
<meta name="twitter:description" content="Mexicano, Americano, Mixicano, King of the Court, Team Americano, Group Championship.">
<meta name="twitter:image" content="https://mexicanopadel.vercel.app/og.svg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f5;--surface:#fff;--border:rgba(0,0,0,.12);--border-md:rgba(0,0,0,.22);
  --text:#1a1a18;--muted:#6b6b66;--hint:#999992;
  --green-bg:#eaf3de;--green-text:#3b6d11;--green-border:#639922;
  --blue-bg:#e6f1fb;--blue-text:#185fa5;--blue-border:#378add;
  --amber-bg:#faeeda;--amber-text:#854f0b;--amber-border:#ef9f27;
  --coral-bg:#faece7;--coral-text:#993c1d;--coral-border:#d85a30;
  --purple-bg:#eeedfe;--purple-text:#3c3489;--purple-border:#7f77dd;
  --teal-bg:#e1f5ee;--teal-text:#0f6e56;--teal-border:#1d9e75;
  --pink-bg:#fbeaf0;--pink-text:#72243e;--pink-border:#d4537e;
  --radius:10px;--radius-sm:6px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--surface:#252523;--border:rgba(255,255,255,.1);--border-md:rgba(255,255,255,.2);
  --text:#f0ede8;--muted:#a0a09a;--hint:#666660;
  --green-bg:#173404;--green-text:#c0dd97;--green-border:#3b6d11;
  --blue-bg:#042c53;--blue-text:#b5d4f4;--blue-border:#185fa5;
  --amber-bg:#412402;--amber-text:#fac775;--amber-border:#854f0b;
  --coral-bg:#4a1b0c;--coral-text:#f5c4b3;--coral-border:#993c1d;
  --purple-bg:#26215c;--purple-text:#cecbf6;--purple-border:#534ab7;
  --teal-bg:#04342c;--teal-text:#9fe1cb;--teal-border:#0f6e56;
  --pink-bg:#4b1528;--pink-text:#f4c0d1;--pink-border:#993556
}}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:820px;margin:0 auto;padding:1.5rem 1rem 3rem}
.header{text-align:center;margin-bottom:1.5rem}
.header h1{font-size:1.6rem;font-weight:500}
.header p{color:var(--muted);font-size:.85rem;margin-top:4px}
.tabs{display:flex;gap:3px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:1.5rem}
.tab{flex:1;padding:7px 4px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s,color .15s}
.tab.active{background:var(--bg);color:var(--text);border:.5px solid var(--border)}
.tab:hover:not(.active){background:var(--bg);color:var(--text)}
.section{display:none}.section.active{display:block}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:500;color:var(--hint);margin-bottom:1rem;letter-spacing:.05em;text-transform:uppercase}
.row{display:flex;gap:8px;align-items:center}
input[type=text],input[type=number],select{width:100%;padding:8px 12px;border:.5px solid var(--border-md);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue-border)}
button{padding:8px 18px;border:.5px solid var(--border-md);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;transition:background .15s}
button:hover{background:var(--bg)}
button.primary{background:var(--text);color:var(--surface);border-color:var(--text)}
button.primary:hover{opacity:.85}
button.danger{color:var(--coral-text);border-color:var(--coral-border)}
button.danger:hover{background:var(--coral-bg)}
button.small{padding:4px 12px;font-size:12px}
button:disabled{opacity:.4;cursor:not-allowed}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;vertical-align:middle}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-coral{background:var(--coral-bg);color:var(--coral-text)}
.badge-purple{background:var(--purple-bg);color:var(--purple-text)}
.badge-teal{background:var(--teal-bg);color:var(--teal-text)}
.badge-pink{background:var(--pink-bg);color:var(--pink-text)}
.info-box{background:var(--blue-bg);border:.5px solid var(--blue-border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--blue-text);margin-bottom:1rem}
.warn-box{background:var(--amber-bg);border:.5px solid var(--amber-border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--amber-text);margin-bottom:1rem}
.success-box{background:var(--green-bg);border:.5px solid var(--green-border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--green-text);margin-bottom:1rem}
.player-list{display:flex;flex-direction:column;gap:6px}
.player-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);border:.5px solid var(--border)}
.player-name{font-size:14px;font-weight:500}
.player-seed{font-size:12px;color:var(--hint);margin-left:6px}
.player-gender{font-size:11px;padding:1px 6px;border-radius:8px;margin-left:6px}
.male-tag{background:var(--blue-bg);color:var(--blue-text)}
.female-tag{background:var(--pink-bg);color:var(--pink-text)}
.round-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:6px}
.round-title{font-size:16px;font-weight:500}
.match-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px}
.match-court{font-size:11px;color:var(--hint);font-weight:500;letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.team{text-align:center}
.team-players{font-size:13px;font-weight:500;line-height:1.6}
.team-score{font-size:22px;font-weight:500;color:var(--text);margin-top:4px}
.vs{font-size:13px;color:var(--hint);text-align:center}
.score-inputs{display:flex;gap:8px;align-items:center;margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)}
.score-inputs input{width:60px;text-align:center}
.leaderboard-table{width:100%;border-collapse:collapse;font-size:14px}
.leaderboard-table th{font-size:11px;font-weight:500;color:var(--hint);letter-spacing:.05em;text-align:left;padding:6px 10px;border-bottom:.5px solid var(--border)}
.leaderboard-table td{padding:9px 10px;border-bottom:.5px solid var(--border)}
.leaderboard-table tr:last-child td{border-bottom:none}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:500}
.rank-1{background:var(--amber-bg);color:var(--amber-text)}
.rank-2{background:var(--bg);color:var(--muted);border:.5px solid var(--border)}
.rank-3{background:var(--coral-bg);color:var(--coral-text)}
.rank-n{background:var(--bg);color:var(--hint);border:.5px solid var(--border);font-size:11px}
.score-total{font-size:16px;font-weight:500}
.settings-row{display:flex;gap:8px;align-items:center;margin-bottom:.75rem;flex-wrap:wrap}
.settings-row label{font-size:13px;color:var(--muted);white-space:nowrap}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:500}
.stat-label{font-size:11px;color:var(--hint);margin-top:2px}
.empty{color:var(--hint);font-size:14px;text-align:center;padding:2rem}
.match-winner-team1 .team:first-child .team-score{color:var(--green-text)}
.match-winner-team2 .team:last-child .team-score{color:var(--green-text)}
.action-bar{display:flex;gap:8px;flex-wrap:wrap}
.format-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:.5rem}
@media(max-width:560px){.format-grid{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.format-grid{grid-template-columns:1fr}}
.format-card{border:.5px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color .15s,background .15s;background:var(--bg);user-select:none}
.format-card:hover{border-color:var(--border-md)}
.format-card.selected{border-width:2px;border-color:var(--blue-border);background:var(--blue-bg)}
.format-card.selected .format-name{color:var(--blue-text)}
.format-icon{font-size:18px;margin-bottom:4px}
.format-name{font-size:13px;font-weight:500}
.format-sub{font-size:11px;color:var(--muted);margin-top:2px}
.kotc-card{border:.5px solid var(--amber-border);background:var(--amber-bg)}
.kotc-card .match-court{color:var(--amber-text)}
.pair-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);border:.5px solid var(--border);margin-bottom:6px}
.pair-names{font-size:14px;font-weight:500}
.pair-num{font-size:12px;color:var(--hint);margin-right:8px}
/* group championship */
.group-section{margin-bottom:1.5rem}
.group-title{font-size:14px;font-weight:500;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.knockout-bracket{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.bracket-round{display:flex;flex-direction:column;gap:10px;min-width:180px}
.bracket-round-label{font-size:11px;color:var(--hint);font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.bracket-match{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px}
.bracket-match .bm-team{padding:3px 0;font-weight:500;border-radius:3px}
.bracket-match .bm-team.winner{color:var(--green-text)}
.bracket-match .bm-vs{font-size:11px;color:var(--hint);padding:1px 0}
.phase-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:12px;margin-left:6px}
.phase-group{background:var(--blue-bg);color:var(--blue-text)}
.phase-ko{background:var(--amber-bg);color:var(--amber-text)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎾 Padel Tournament</h1>
    <p>Mexicano · Americano · Mixicano · King of the Court · Team Americano · Group Championship</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('registration')">Registration</button>
    <button class="tab" onclick="switchTab('rounds')">Rounds</button>
    <button class="tab" onclick="switchTab('leaderboard')">Leaderboard</button>
  </div>

  <div id="tab-registration" class="section active">
    <div class="card">
      <div class="card-title">Tournament Format</div>
      <div class="format-grid" id="format-grid"></div>
      <div id="format-desc-box" style="margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:.5px solid var(--border);min-height:48px;"></div>
    </div>

    <div class="card">
      <div class="card-title">Settings</div>
      <div class="settings-row">
        <label>Points per match:</label>
        <input type="number" id="points-setting" value="24" min="1" max="999" style="width:80px;" onchange="saveSettings()">
        <label style="margin-left:16px;">Rounds:</label>
        <input type="number" id="rounds-setting" value="5" min="1" max="20" style="width:70px;" onchange="saveSettings()" id="rounds-input">
        <button class="small" onclick="applySettings()" style="margin-left:8px;">Apply</button>
      </div>
      <div id="gc-extra-settings" style="display:none">
        <div class="settings-row" style="margin-top:4px">
          <label>Groups of:</label>
          <select id="gc-group-size" style="width:80px">
            <option value="3">3 pairs</option>
            <option value="4" selected>4 pairs</option>
          </select>
          <label style="margin-left:16px;">Advance top:</label>
          <select id="gc-advance" style="width:80px">
            <option value="1">1 per group</option>
            <option value="2" selected>2 per group</option>
          </select>
        </div>
      </div>
      <div id="settings-msg" style="font-size:12px;color:var(--green-text);min-height:16px;margin-top:4px;"></div>
    </div>

    <div class="card">
      <div class="card-title" id="add-card-title">Add Players</div>
      <div id="add-inputs"></div>
      <div id="player-error" style="font-size:12px;color:var(--coral-text);min-height:16px;margin-bottom:8px;"></div>
      <div class="action-bar" style="margin-bottom:14px;">
        <button class="small" onclick="addSamples()" id="sample-btn">+ Add samples</button>
        <button class="small danger" onclick="clearAll()">Clear all</button>
      </div>
      <div id="player-list"></div>
      <div id="player-count-info" style="font-size:12px;color:var(--hint);margin-top:10px;text-align:right;"></div>
    </div>
    <div id="start-btn-area"></div>
  </div>

  <div id="tab-rounds" class="section">
    <div id="rounds-content"></div>
  </div>

  <div id="tab-leaderboard" class="section">
    <div id="leaderboard-content"></div>
  </div>
</div>

<div style="text-align:center;padding:2rem 0 1.5rem;color:var(--hint);font-size:11px;letter-spacing:.04em;">
  <span id="tournament-counter"></span>
</div>

<script>
const FORMATS = {
  mexicano:  { name:'Mexicano',           icon:'🔄', tag:'individual · seeded',    color:'badge-blue',   desc:'Partners rotate every round based on the live leaderboard. #1&#38;#3 vs #2&#38;#4 per court. Points scored count individually. Best for mixed groups wanting competitive variety.', unit:'players', minPlayers:8, multiple:4 },
  americano: { name:'Americano',          icon:'🎲', tag:'individual · random',    color:'badge-purple', desc:'Random pairings each round — everyone plays with different partners. Individual scoring. Great for social, relaxed sessions.', unit:'players', minPlayers:8, multiple:4 },
  mixicano:  { name:'Mixicano',           icon:'⚡', tag:'mixed · man+woman',      color:'badge-pink',   desc:'Mixed format: every pair must be one man + one woman. Seeded like Mexicano from round 2. Equal number of men and women required. Points individual.', unit:'players', minPlayers:8, multiple:4 },
  kingcourt: { name:'King of the Court',  icon:'👑', tag:'high energy · rotates',  color:'badge-amber',  desc:'Winners stay on the King Court, losers rotate to the back of the queue. Fast and intense. Any group size — everyone stays active.', unit:'players', minPlayers:6, multiple:2 },
  teamamericano: { name:'Team Americano', icon:'🤝', tag:'fixed pairs',            color:'badge-teal',   desc:'Pre-made pairs stay together all tournament. Teams rotate opponents each round, seeded by score from round 2. Perfect for duos.', unit:'pairs', minPlayers:4, multiple:2 },
  groupchamp: { name:'Group Championship',icon:'🏆', tag:'groups + knockout',      color:'badge-green',  desc:'Pairs divided into groups for a round-robin group stage. Top pairs from each group advance to a knockout bracket (semifinals → final). Classic competitive tournament format.', unit:'pairs', minPlayers:4, multiple:2 }
};

let state = {
  format: 'mexicano',
  players: [],   // {id, name, gender?, scores:[], totalScore, wins, losses}
  pairs: [],     // {id, p1, p2, scores:[], totalScore, wins, losses, groupId?}
  rounds: [],
  pointsPerMatch: 24,
  totalRounds: 5,
  started: false,
  kingCourtPlayers: [],
  waitingPlayers: [],
  // group championship
  groups: [],          // [{id, name, pairs:[pairIds], matches:[]}]
  gcPhase: 'group',    // 'group' | 'knockout'
  knockoutMatches: [], // [{id, round, pos, pairA, pairB, scoreA, scoreB, locked}]
  gcGroupSize: 4,
  gcAdvance: 2,
};

function uid(){ return Math.random().toString(36).slice(2,9); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }

function saveSettings(){
  state.pointsPerMatch = Math.max(1,parseInt(document.getElementById('points-setting').value)||24);
  state.totalRounds = Math.max(1,parseInt(document.getElementById('rounds-setting').value)||5);
  state.gcGroupSize = parseInt(document.getElementById('gc-group-size').value)||4;
  state.gcAdvance = parseInt(document.getElementById('gc-advance').value)||2;
}
function applySettings(){
  saveSettings();
  const msg=document.getElementById('settings-msg');
  msg.textContent=`Saved: ${state.pointsPerMatch} pts/match · ${state.totalRounds} rounds`;
  setTimeout(()=>{msg.textContent='';},2500);
  if(state.started){ renderRounds(); renderLeaderboard(); }
}

// ---- FORMAT PICKER ----
function renderFormatPicker(){
  document.getElementById('format-grid').innerHTML=Object.entries(FORMATS).map(([key,f])=>`
    <div class="format-card${state.format===key?' selected':''}" onclick="selectFormat('${key}')">
      <div class="format-icon">${f.icon}</div>
      <div class="format-name">${f.name}</div>
      <div class="format-sub">${f.tag}</div>
    </div>`).join('');
  document.getElementById('format-desc-box').innerHTML=FORMATS[state.format].desc;
  document.getElementById('gc-extra-settings').style.display=state.format==='groupchamp'?'block':'none';
}
function selectFormat(key){
  if(state.started) return;
  state.format=key;
  renderFormatPicker();
  renderAddSection();
  renderStartArea();
}

// ---- ADD SECTION ----
function renderAddSection(){
  const isTeam=state.format==='teamamericano'||state.format==='groupchamp';
  const isMix=state.format==='mixicano';
  document.getElementById('add-card-title').textContent=isTeam?'Add Pairs':'Add Players';
  document.getElementById('sample-btn').textContent=isTeam?'+ Add 8 sample pairs':isMix?'+ Add 8 sample players (4M+4F)':'+ Add 8 sample players';

  if(isTeam){
    document.getElementById('add-inputs').innerHTML=`
      <div class="row" style="margin-bottom:8px;">
        <input type="text" id="p1-input" placeholder="Player 1" onkeydown="if(event.key==='Enter')document.getElementById('p2-input').focus()" style="flex:1">
        <span style="color:var(--hint);padding:0 4px">+</span>
        <input type="text" id="p2-input" placeholder="Player 2" onkeydown="if(event.key==='Enter')addPair()" style="flex:1">
        <button class="primary small" onclick="addPair()">Add pair</button>
      </div>`;
  } else if(isMix){
    document.getElementById('add-inputs').innerHTML=`
      <div class="row" style="margin-bottom:8px;">
        <input type="text" id="player-input" placeholder="Player name" onkeydown="if(event.key==='Enter')addPlayer()" style="flex:1">
        <select id="gender-select" style="width:100px">
          <option value="M">Man (M)</option>
          <option value="F">Woman (F)</option>
        </select>
        <button class="primary" onclick="addPlayer()">Add</button>
      </div>`;
  } else {
    document.getElementById('add-inputs').innerHTML=`
      <div class="row" style="margin-bottom:12px;">
        <input type="text" id="player-input" placeholder="Player name" onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="primary" onclick="addPlayer()">Add</button>
      </div>`;
  }
  renderList();
}

function addPlayer(){
  if(state.started) return;
  const input=document.getElementById('player-input');
  const name=input.value.trim();
  const err=document.getElementById('player-error');
  if(!name){err.textContent='Enter a name.';return;}
  if(state.players.find(p=>p.name.toLowerCase()===name.toLowerCase())){err.textContent='Already exists.';return;}
  err.textContent='';
  const gender=state.format==='mixicano'?(document.getElementById('gender-select')||{value:'M'}).value:'';
  state.players.push({id:uid(),name,gender,scores:[],totalScore:0,wins:0,losses:0});
  input.value=''; input.focus();
  renderList(); renderStartArea();
}

function addPair(){
  if(state.started) return;
  const p1=document.getElementById('p1-input').value.trim();
  const p2=document.getElementById('p2-input').value.trim();
  const err=document.getElementById('player-error');
  if(!p1||!p2){err.textContent='Enter both names.';return;}
  err.textContent='';
  state.pairs.push({id:uid(),p1,p2,scores:[],totalScore:0,wins:0,losses:0,groupPoints:0});
  document.getElementById('p1-input').value='';
  document.getElementById('p2-input').value='';
  document.getElementById('p1-input').focus();
  renderList(); renderStartArea();
}

function removeItem(id){
  if(state.started) return;
  if(state.format==='teamamericano'||state.format==='groupchamp') state.pairs=state.pairs.filter(p=>p.id!==id);
  else state.players=state.players.filter(p=>p.id!==id);
  renderList(); renderStartArea();
}
function clearAll(){
  if(state.started) return;
  state.players=[]; state.pairs=[];
  renderList(); renderStartArea();
}
function addSamples(){
  if(state.started) return;
  const isTeam=state.format==='teamamericano'||state.format==='groupchamp';
  const isMix=state.format==='mixicano';
  if(isTeam){
    [['Alex','Bruno'],['Carla','Diana'],['Emilio','Fatima'],['Gabriel','Helena'],
     ['Ivan','Julia'],['Karl','Laura'],['Mario','Nina'],['Oscar','Paula']].forEach(([p1,p2])=>{
      if(!state.pairs.find(p=>p.p1===p1)) state.pairs.push({id:uid(),p1,p2,scores:[],totalScore:0,wins:0,losses:0,groupPoints:0});
    });
  } else if(isMix){
    ['Alex','Bruno','Carlos','David'].forEach(n=>{if(!state.players.find(p=>p.name===n)) state.players.push({id:uid(),name:n,gender:'M',scores:[],totalScore:0,wins:0,losses:0});});
    ['Emma','Fatima','Gloria','Helena'].forEach(n=>{if(!state.players.find(p=>p.name===n)) state.players.push({id:uid(),name:n,gender:'F',scores:[],totalScore:0,wins:0,losses:0});});
  } else {
    ['Alex','Bruno','Carla','Diana','Emilio','Fatima','Gabriel','Helena'].forEach(name=>{
      if(!state.players.find(p=>p.name===name)) state.players.push({id:uid(),name,gender:'',scores:[],totalScore:0,wins:0,losses:0});
    });
  }
  renderList(); renderStartArea();
}

function renderList(){
  const list=document.getElementById('player-list');
  const info=document.getElementById('player-count-info');
  const isTeam=state.format==='teamamericano'||state.format==='groupchamp';
  const isMix=state.format==='mixicano';
  if(isTeam){
    const c=state.pairs.length;
    if(!c){list.innerHTML='<div class="empty">No pairs yet.</div>';info.textContent='';return;}
    list.innerHTML=state.pairs.map((p,i)=>`
      <div class="pair-item">
        <span><span class="pair-num">#${i+1}</span><span class="pair-names">${escHtml(p.p1)} & ${escHtml(p.p2)}</span></span>
        ${!state.started?`<button class="small danger" onclick="removeItem('${p.id}')">Remove</button>`:''}
      </div>`).join('');
    info.textContent=`${c} pairs · ${Math.floor(c/2)} courts`;
  } else {
    const c=state.players.length;
    if(!c){list.innerHTML='<div class="empty">No players yet.</div>';info.textContent='';return;}
    const men=state.players.filter(p=>p.gender==='M').length;
    const women=state.players.filter(p=>p.gender==='F').length;
    list.innerHTML=state.players.map((p,i)=>`
      <div class="player-item">
        <span>
          <span class="player-name">${escHtml(p.name)}</span>
          <span class="player-seed">#${i+1}</span>
          ${isMix?`<span class="player-gender ${p.gender==='M'?'male-tag':'female-tag'}">${p.gender==='M'?'M':'F'}</span>`:''}
        </span>
        ${!state.started?`<button class="small danger" onclick="removeItem('${p.id}')">Remove</button>`:''}
      </div>`).join('');
    if(isMix) info.textContent=`${c} players · ${men} men · ${women} women`;
    else if(state.format==='kingcourt') info.textContent=`${c} players · 1 king court + ${Math.max(0,c-4)} in queue`;
    else info.textContent=`${c} players · ${Math.floor(c/4)} courts`;
  }
}

function renderStartArea(){
  const area=document.getElementById('start-btn-area');
  if(state.started){area.innerHTML=`<div class="info-box">Tournament in progress — ${state.rounds.length} round(s) generated.</div>`;return;}
  const fmt=FORMATS[state.format];
  const isTeam=state.format==='teamamericano'||state.format==='groupchamp';
  const isMix=state.format==='mixicano';
  const count=isTeam?state.pairs.length:state.players.length;
  if(count<fmt.minPlayers){area.innerHTML=`<div class="warn-box">Add at least ${fmt.minPlayers} ${fmt.unit} to start.</div>`;return;}
  if(count%fmt.multiple!==0){area.innerHTML=`<div class="warn-box">${fmt.name} needs multiples of ${fmt.multiple} ${fmt.unit}. Currently: ${count}.</div>`;return;}
  if(isMix){
    const men=state.players.filter(p=>p.gender==='M').length;
    const women=state.players.filter(p=>p.gender==='F').length;
    if(men!==women){area.innerHTML=`<div class="warn-box">Mixicano needs equal men and women. Currently: ${men} men, ${women} women.</div>`;return;}
  }
  area.innerHTML=`
    <div class="info-box">Ready! ${count} ${fmt.unit} · ${fmt.name} format.</div>
    <button class="primary" style="width:100%;padding:12px;" onclick="startTournament()">Start ${fmt.name} →</button>`;
}

// ---- TOURNAMENT ----
function getPlayer(id){return state.players.find(p=>p.id===id);}
function getPair(id){return state.pairs.find(p=>p.id===id);}
function pname(id){const p=getPlayer(id);return p?escHtml(p.name):'?';}
function getSortedPlayers(){return [...state.players].sort((a,b)=>b.totalScore-a.totalScore);}
function getSortedPairs(){return [...state.pairs].sort((a,b)=>b.totalScore-a.totalScore);}

function startTournament(){
  saveSettings();
  state.started=true; state.rounds=[]; state.gcPhase='group'; state.groups=[]; state.knockoutMatches=[];
  state.players.forEach(p=>{p.scores=[];p.totalScore=0;p.wins=0;p.losses=0;});
  state.pairs.forEach(p=>{p.scores=[];p.totalScore=0;p.wins=0;p.losses=0;p.groupPoints=0;});
  incrementTournamentCount();

  if(state.format==='kingcourt'){
    const s=shuffle(state.players);
    state.kingCourtPlayers=s.slice(0,4);
    state.waitingPlayers=s.slice(4);
  }
  if(state.format==='groupchamp'){
    setupGroups();
    generateGroupRound();
  } else {
    generateRound();
  }
  switchTab('rounds');
  renderStartArea();
}

// ---- GROUP CHAMPIONSHIP ----
function setupGroups(){
  const gs=state.gcGroupSize;
  const shuffled=shuffle(state.pairs);
  const numGroups=Math.ceil(shuffled.length/gs);
  state.groups=[];
  for(let g=0;g<numGroups;g++){
    const pairsInGroup=shuffled.slice(g*gs,g*gs+gs);
    state.groups.push({
      id:uid(),
      name:'Group '+String.fromCharCode(65+g),
      pairIds:pairsInGroup.map(p=>p.id),
      matches:[],
      done:false
    });
    pairsInGroup.forEach(p=>{p.groupId=state.groups[g].id;});
  }
}

function generateGroupRound(){
  // Generate all round-robin matches within each group at once
  const roundNum=state.rounds.length+1;
  const matches=[];
  let courtNum=1;
  state.groups.forEach(group=>{
    const pairs=group.pairIds.map(getPair).filter(Boolean);
    for(let i=0;i<pairs.length;i++){
      for(let j=i+1;j<pairs.length;j++){
        const m={id:uid(),court:courtNum++,pairA:pairs[i].id,pairB:pairs[j].id,score1:null,score2:null,locked:false,type:'groupchamp',groupId:group.id};
        group.matches.push(m.id);
        matches.push(m);
      }
    }
  });
  state.rounds.push({id:uid(),num:roundNum,matches,complete:false,phase:'group',label:'Group Stage'});
  renderRounds(); renderLeaderboard();
}

function isGroupStageDone(){
  return state.rounds.filter(r=>r.phase==='group').every(r=>r.complete);
}

function getGroupStandings(group){
  // Returns pairs sorted by: group points desc, score diff desc
  return group.pairIds.map(getPair).filter(Boolean).sort((a,b)=>{
    if(b.groupPoints!==a.groupPoints) return b.groupPoints-a.groupPoints;
    const sdA=a.scores.reduce((s,x)=>s+x,0)-a.losses*state.pointsPerMatch;
    const sdB=b.scores.reduce((s,x)=>s+x,0)-b.losses*state.pointsPerMatch;
    return sdB-sdA;
  });
}

function generateKnockout(){
  // Gather top N from each group
  const adv=state.gcAdvance;
  let advancers=[];
  state.groups.forEach(g=>{
    const standings=getGroupStandings(g);
    advancers.push(...standings.slice(0,adv));
  });
  // Seed bracket: A1 vs B2, B1 vs A2 ...
  const shuffledAdv=advancers; // keep seeded order
  const numPairs=advancers.length;
  const rounds=Math.ceil(Math.log2(numPairs));
  state.knockoutMatches=[];
  // Build SF round
  const sfMatches=[];
  for(let i=0;i<Math.floor(numPairs/2);i++){
    sfMatches.push({id:uid(),koRound:1,pos:i,pairA:advancers[i*2]?.id||null,pairB:advancers[i*2+1]?.id||null,score1:null,score2:null,locked:false,type:'knockout',label:numPairs===2?'Final':'Semifinal'});
  }
  state.knockoutMatches.push(...sfMatches);
  if(numPairs>2){
    state.knockoutMatches.push({id:uid(),koRound:2,pos:0,pairA:null,pairB:null,score1:null,score2:null,locked:false,type:'knockout',label:'Final'});
  }
  state.gcPhase='knockout';
  // Create a round for knockout
  const koRoundMatches=state.knockoutMatches.filter(m=>m.koRound===1);
  state.rounds.push({id:uid(),num:state.rounds.length+1,matches:koRoundMatches,complete:false,phase:'knockout',label:'Knockout Stage'});
  renderRounds(); renderLeaderboard();
}

function advanceKnockout(){
  // After SF, populate final with winners
  const sfMatches=state.knockoutMatches.filter(m=>m.koRound===1&&m.locked);
  const finalMatch=state.knockoutMatches.find(m=>m.koRound===2);
  if(!finalMatch) return;
  const winners=sfMatches.map(m=>m.score1>m.score2?m.pairA:m.pairB);
  finalMatch.pairA=winners[0]||null;
  finalMatch.pairB=winners[1]||null;
  const finalRound={id:uid(),num:state.rounds.length+1,matches:[finalMatch],complete:false,phase:'knockout',label:'Final'};
  state.rounds.push(finalRound);
  renderRounds(); renderLeaderboard();
}

// ---- GENERATE ROUND (non-group-champ) ----
function generateRound(){
  const n=state.rounds.length+1;
  let matches=[];

  if(state.format==='mexicano'){
    const ordered=n===1?shuffle(state.players):getSortedPlayers();
    for(let i=0;i<ordered.length;i+=4){
      const g=ordered.slice(i,i+4); if(g.length<4) break;
      matches.push({id:uid(),court:Math.floor(i/4)+1,team1:[g[0].id,g[2].id],team2:[g[1].id,g[3].id],score1:null,score2:null,locked:false,type:'mexicano'});
    }
  } else if(state.format==='americano'){
    const s=shuffle(state.players);
    for(let i=0;i<s.length;i+=4){
      const g=s.slice(i,i+4); if(g.length<4) break;
      matches.push({id:uid(),court:Math.floor(i/4)+1,team1:[g[0].id,g[1].id],team2:[g[2].id,g[3].id],score1:null,score2:null,locked:false,type:'americano'});
    }
  } else if(state.format==='mixicano'){
    // Pair men with women based on leaderboard rank
    const men=n===1?shuffle(state.players.filter(p=>p.gender==='M')):[...state.players.filter(p=>p.gender==='M')].sort((a,b)=>b.totalScore-a.totalScore);
    const women=n===1?shuffle(state.players.filter(p=>p.gender==='F')):[...state.players.filter(p=>p.gender==='F')].sort((a,b)=>b.totalScore-a.totalScore);
    const numCourts=Math.min(men.length,women.length)/2;
    // team1: men[0]+women[0] vs men[1]+women[1], then men[2]+women[2] vs men[3]+women[3]
    for(let i=0;i<numCourts;i++){
      const court=i+1;
      const t1=[men[i*2]?.id,women[i*2]?.id].filter(Boolean);
      const t2=[men[i*2+1]?.id,women[i*2+1]?.id].filter(Boolean);
      if(t1.length===2&&t2.length===2)
        matches.push({id:uid(),court,team1:t1,team2:t2,score1:null,score2:null,locked:false,type:'mixicano'});
    }
  } else if(state.format==='kingcourt'){
    const kp=state.kingCourtPlayers;
    matches.push({id:uid(),court:1,isKing:true,team1:[kp[0].id,kp[1].id],team2:[kp[2].id,kp[3].id],score1:null,score2:null,locked:false,type:'kingcourt',waitingSnap:[...state.waitingPlayers.map(p=>p.id)]});
    for(let i=0;i+3<state.waitingPlayers.length;i+=4){
      const g=state.waitingPlayers.slice(i,i+4);
      matches.push({id:uid(),court:matches.length+1,isKing:false,team1:[g[0].id,g[1].id],team2:[g[2].id,g[3].id],score1:null,score2:null,locked:false,type:'kingcourt'});
    }
  } else if(state.format==='teamamericano'){
    const ordered=n===1?shuffle(state.pairs):getSortedPairs();
    for(let i=0;i<ordered.length;i+=2){
      const g=ordered.slice(i,i+2); if(g.length<2) break;
      matches.push({id:uid(),court:Math.floor(i/2)+1,pairA:g[0].id,pairB:g[1].id,score1:null,score2:null,locked:false,type:'teamamericano'});
    }
  }

  state.rounds.push({id:uid(),num:n,matches,complete:false,phase:'play',label:''});
  renderRounds(); renderLeaderboard();
}

// ---- SUBMIT SCORE ----
function submitScore(matchId, roundIdx){
  const round=state.rounds[roundIdx];
  const match=round.matches.find(m=>m.id===matchId);
  const pts=state.pointsPerMatch;
  const s1=parseInt(document.getElementById(`s1-${matchId}`).value);
  const s2=parseInt(document.getElementById(`s2-${matchId}`).value);
  if(isNaN(s1)||isNaN(s2)){alert('Enter valid scores.');return;}
  if(s1<0||s2<0){alert('Scores must be 0 or more.');return;}

  const isKO=match.type==='knockout';
  if(!isKO && s1+s2!==pts){alert(`Scores must add up to ${pts}.`);return;}
  if(isKO && s1===s2){alert('No draws in knockout — one team must win.');return;}

  match.score1=s1; match.score2=s2; match.locked=true;

  if(match.type==='teamamericano'||match.type==='groupchamp'){
    const pA=getPair(match.pairA); if(pA){pA.scores.push(s1);pA.totalScore+=s1;if(s1>s2){pA.wins++;pA.groupPoints+=3;}else{pA.losses++;}}
    const pB=getPair(match.pairB); if(pB){pB.scores.push(s2);pB.totalScore+=s2;if(s2>s1){pB.wins++;pB.groupPoints+=3;}else{pB.losses++;}}
  } else if(match.type==='knockout'){
    // no score accumulation for knockout, just record result
  } else {
    match.team1.forEach(pid=>{const p=getPlayer(pid);if(p){p.scores.push(s1);p.totalScore+=s1;if(s1>s2)p.wins++;else p.losses++;}});
    match.team2.forEach(pid=>{const p=getPlayer(pid);if(p){p.scores.push(s2);p.totalScore+=s2;if(s2>s1)p.wins++;else p.losses++;}});
  }

  if(match.type==='kingcourt'&&match.isKing){
    const winners=(s1>s2?match.team1:match.team2).map(getPlayer).filter(Boolean);
    const losers=(s1>s2?match.team2:match.team1).map(getPlayer).filter(Boolean);
    const incoming=state.waitingPlayers.slice(0,2);
    state.waitingPlayers=[...state.waitingPlayers.slice(2),...losers];
    state.kingCourtPlayers=[...winners,...incoming];
  }

  if(round.matches.every(m=>m.locked)) round.complete=true;

  // Group champ: after group stage done, offer knockout
  if(state.format==='groupchamp'&&round.phase==='group'&&round.complete&&isGroupStageDone()){
    // check if all SF locked to advance to final
  }
  if(state.format==='groupchamp'&&round.phase==='knockout'){
    const sfsDone=state.knockoutMatches.filter(m=>m.koRound===1).every(m=>m.locked);
    const finalExists=state.knockoutMatches.some(m=>m.koRound===2);
    if(sfsDone&&finalExists&&!state.rounds.find(r=>r.phase==='knockout'&&r.label==='Final')?.complete){
      // populate final with winners if not yet done
      const finalMatch=state.knockoutMatches.find(m=>m.koRound===2);
      if(finalMatch&&!finalMatch.pairA){
        const sfMatches=state.knockoutMatches.filter(m=>m.koRound===1&&m.locked);
        finalMatch.pairA=sfMatches[0]?.(m=>m.score1>m.score2?m.pairA:m.pairB)||sfMatches[0]?.pairA;
        // recalc winners
        sfMatches.forEach((m,i)=>{
          const winner=m.score1>m.score2?m.pairA:m.pairB;
          if(i===0) finalMatch.pairA=winner;
          if(i===1) finalMatch.pairB=winner;
        });
        const finalRound={id:uid(),num:state.rounds.length+1,matches:[finalMatch],complete:false,phase:'knockout',label:'Final'};
        state.rounds.push(finalRound);
      }
    }
  }

  renderRounds(); renderLeaderboard();
}

// ---- RENDER ROUNDS ----
function renderRounds(){
  const div=document.getElementById('rounds-content');
  if(!state.started||!state.rounds.length){div.innerHTML='<div class="empty">Start the tournament from the Registration tab.</div>';return;}
  const fmtColor={mexicano:'badge-blue',americano:'badge-purple',mixicano:'badge-pink',kingcourt:'badge-amber',teamamericano:'badge-teal',groupchamp:'badge-green'}[state.format];
  const lastRound=state.rounds[state.rounds.length-1];
  const canNext=lastRound.complete&&state.format!=='groupchamp'&&state.rounds.length<state.totalRounds;
  const isGCGroupDone=state.format==='groupchamp'&&isGroupStageDone()&&state.gcPhase==='group';
  const allKODone=state.format==='groupchamp'&&state.gcPhase==='knockout'&&lastRound.complete;

  let html=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${state.rounds.length}</div><div class="stat-label">Rounds</div></div>
    <div class="stat-card"><div class="stat-val">${state.format==='groupchamp'?'GC':state.totalRounds}</div><div class="stat-label">${state.format==='groupchamp'?'Format':'Total rounds'}</div></div>
    <div class="stat-card"><div class="stat-val">${state.pointsPerMatch}</div><div class="stat-label">Pts / match</div></div>
  </div>`;

  if(canNext) html+=`<div class="info-box" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <span>Round ${state.rounds.length} complete!</span>
    <button class="primary small" onclick="generateRound()">Generate round ${state.rounds.length+1} →</button>
  </div>`;

  if(isGCGroupDone) html+=`<div class="info-box" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <span>Group stage complete! Top ${state.gcAdvance} from each group advance.</span>
    <button class="primary small" onclick="generateKnockout()">Start Knockout →</button>
  </div>`;

  if(allKODone){
    const finalM=state.knockoutMatches.find(m=>m.label==='Final'&&m.locked);
    if(finalM){
      const winner=getPair(finalM.score1>finalM.score2?finalM.pairA:finalM.pairB);
      if(winner) html+=`<div class="success-box">🏆 Tournament champion: <strong>${escHtml(winner.p1)} & ${escHtml(winner.p2)}</strong>!</div>`;
    }
  } else if(!isGCGroupDone&&!canNext&&state.format!=='groupchamp'&&state.rounds.length>=state.totalRounds&&lastRound.complete){
    html+=`<div class="success-box">🏆 Tournament complete! Check the Leaderboard for final standings.</div>`;
  }

  [...state.rounds].reverse().forEach(round=>{
    const phaseLabel=round.phase==='group'?`<span class="phase-badge phase-group">group stage</span>`:
      round.phase==='knockout'?`<span class="phase-badge phase-ko">${round.label}</span>`:'';
    html+=`<div class="card">
      <div class="round-header">
        <span class="round-title">Round ${round.num} ${phaseLabel}</span>
        <span>
          <span class="badge ${fmtColor}">${FORMATS[state.format].name}</span>
          ${round.complete?'<span class="badge badge-green" style="margin-left:4px">complete</span>':''}
        </span>
      </div>`;

    // Group championship: show group name above matches
    let lastGroupId=null;
    round.matches.forEach(match=>{
      const done=match.locked;
      const t1w=done&&match.score1>match.score2, t2w=done&&match.score2>match.score1;

      if((match.type==='groupchamp'||match.type==='teamamericano')&&match.type!=='knockout'){
        const pA=getPair(match.pairA),pB=getPair(match.pairB);
        if(match.type==='groupchamp'&&match.groupId!==lastGroupId){
          const grp=state.groups.find(g=>g.id===match.groupId);
          if(grp) html+=`<div style="font-size:11px;font-weight:500;color:var(--hint);letter-spacing:.05em;text-transform:uppercase;margin:10px 0 4px;">${grp.name}</div>`;
          lastGroupId=match.groupId;
        }
        html+=`<div class="match-card ${t1w?'match-winner-team1':t2w?'match-winner-team2':''}">
          <div class="match-court">Court ${match.court}</div>
          <div class="match-teams">
            <div class="team"><div class="team-players">${pA?escHtml(pA.p1)+'<br>'+escHtml(pA.p2):'TBD'}</div>${done?`<div class="team-score">${match.score1}</div>`:''}</div>
            <div class="vs">vs</div>
            <div class="team"><div class="team-players">${pB?escHtml(pB.p1)+'<br>'+escHtml(pB.p2):'TBD'}</div>${done?`<div class="team-score">${match.score2}</div>`:''}</div>
          </div>`;
      } else if(match.type==='knockout'){
        const pA=getPair(match.pairA),pB=getPair(match.pairB);
        html+=`<div class="match-card" style="border-color:var(--amber-border)">
          <div class="match-court" style="color:var(--amber-text)">${match.label||'Knockout'}</div>
          <div class="match-teams">
            <div class="team"><div class="team-players" ${t1w?'style="color:var(--green-text)"':''}>${pA?escHtml(pA.p1)+'<br>'+escHtml(pA.p2):'TBD'}</div>${done?`<div class="team-score">${match.score1}</div>`:''}</div>
            <div class="vs">vs</div>
            <div class="team"><div class="team-players" ${t2w?'style="color:var(--green-text)"':''}>${pB?escHtml(pB.p1)+'<br>'+escHtml(pB.p2):'TBD'}</div>${done?`<div class="team-score">${match.score2}</div>`:''}</div>
          </div>`;
      } else {
        const king=match.isKing;
        html+=`<div class="match-card ${king?'kotc-card':''} ${t1w?'match-winner-team1':t2w?'match-winner-team2':''}">
          <div class="match-court">${king?'👑 King Court':'Court '+match.court}</div>
          <div class="match-teams">
            <div class="team"><div class="team-players">${pname(match.team1[0])}<br>${pname(match.team1[1])}</div>${done?`<div class="team-score">${match.score1}</div>`:''}</div>
            <div class="vs">vs</div>
            <div class="team"><div class="team-players">${pname(match.team2[0])}<br>${pname(match.team2[1])}</div>${done?`<div class="team-score">${match.score2}</div>`:''}</div>
          </div>`;
        if(king&&match.waitingSnap&&!done){
          const w=match.waitingSnap.map(getPlayer).filter(Boolean);
          if(w.length) html+=`<div style="margin-top:8px;font-size:12px;color:var(--hint)">Waiting: ${w.map(p=>escHtml(p.name)).join(', ')}</div>`;
        }
      }

      if(!done){
        const isKO=match.type==='knockout';
        const notReady=isKO&&(!match.pairA||!match.pairB);
        if(notReady){
          html+=`<div style="margin-top:8px;font-size:12px;color:var(--hint)">Waiting for previous results…</div>`;
        } else {
          html+=`<div class="score-inputs">
            <input type="number" id="s1-${match.id}" min="0" max="${state.pointsPerMatch}" placeholder="0" style="width:60px;text-align:center">
            <span style="color:var(--hint);font-size:12px;flex:1;text-align:center">${isKO?'winner wins':'total = '+state.pointsPerMatch}</span>
            <input type="number" id="s2-${match.id}" min="0" max="${state.pointsPerMatch}" placeholder="0" style="width:60px;text-align:center">
            <button class="small primary" onclick="submitScore('${match.id}',${state.rounds.indexOf(round)})">Save</button>
          </div>`;
        }
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  div.innerHTML=html;
}

// ---- RENDER LEADERBOARD ----
function renderLeaderboard(){
  const div=document.getElementById('leaderboard-content');
  if(!state.started){div.innerHTML='<div class="empty">Start the tournament to see rankings.</div>';return;}
  const isTeam=['teamamericano','groupchamp'].includes(state.format);
  const sorted=isTeam?getSortedPairs():getSortedPlayers();
  const done=state.rounds.filter(r=>r.complete).length;

  let html=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${sorted.length}</div><div class="stat-label">${isTeam?'Pairs':'Players'}</div></div>
    <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-label">Rounds done</div></div>
    <div class="stat-card"><div class="stat-val">${sorted[0]?sorted[0].totalScore:0}</div><div class="stat-label">Top score</div></div>
  </div>`;

  // Group championship: show per-group standings
  if(state.format==='groupchamp'&&state.groups.length){
    state.groups.forEach(group=>{
      const standings=getGroupStandings(group);
      html+=`<div class="card">
        <div class="card-title">${group.name} — Group Standings</div>
        <table class="leaderboard-table">
          <thead><tr><th>#</th><th>Pair</th><th>GP</th><th>W</th><th>L</th><th>Score</th></tr></thead><tbody>`;
      standings.forEach((p,i)=>{
        const advances=i<state.gcAdvance;
        html+=`<tr style="${advances?'background:var(--green-bg)':''}">
          <td><span class="rank-badge ${i===0?'rank-1':i===1?'rank-2':'rank-n'}">${i+1}</span></td>
          <td style="font-weight:500">${escHtml(p.p1)} & ${escHtml(p.p2)}${advances?'<span class="badge badge-green" style="margin-left:6px">advances</span>':''}</td>
          <td style="font-weight:500">${p.groupPoints}</td>
          <td style="color:var(--green-text)">${p.wins}</td>
          <td style="color:var(--coral-text)">${p.losses}</td>
          <td>${p.totalScore}</td>
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    });
    // Knockout results
    if(state.knockoutMatches.length){
      html+=`<div class="card"><div class="card-title">Knockout Stage</div>`;
      state.knockoutMatches.forEach(m=>{
        const pA=getPair(m.pairA),pB=getPair(m.pairB);
        const winner=m.locked?(m.score1>m.score2?pA:pB):null;
        html+=`<div class="match-card" style="border-color:var(--amber-border);margin-bottom:8px">
          <div class="match-court" style="color:var(--amber-text)">${m.label}</div>
          <div style="font-size:13px;font-weight:500">
            ${pA?escHtml(pA.p1)+' & '+escHtml(pA.p2):'TBD'}
            <span style="color:var(--hint);margin:0 8px">vs</span>
            ${pB?escHtml(pB.p1)+' & '+escHtml(pB.p2):'TBD'}
            ${m.locked?`<span style="color:var(--hint);margin-left:8px;font-size:12px">${m.score1}–${m.score2}</span>`:''}
            ${winner?`<span class="badge badge-green" style="margin-left:8px">Winner: ${escHtml(winner.p1)}</span>`:''}
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    div.innerHTML=html; return;
  }

  // Standard leaderboard
  html+=`<div class="card">
    <div class="card-title">Standings — ${FORMATS[state.format].name}</div>
    <table class="leaderboard-table">
      <thead><tr><th>Rank</th><th>${isTeam?'Pair':'Player'}</th><th>Score</th><th>W/L</th><th>Avg</th><th>History</th></tr></thead><tbody>`;
  sorted.forEach((p,i)=>{
    const rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    const avg=p.scores.length?(p.totalScore/p.scores.length).toFixed(1):'-';
    const hist=p.scores.map(s=>{
      const c=s>=state.pointsPerMatch*.6?'var(--green-text)':s<=state.pointsPerMatch*.4?'var(--coral-text)':'var(--muted)';
      return `<span style="color:${c};font-weight:500">${s}</span>`;
    }).join('<span style="color:var(--hint)"> · </span>');
    const name=isTeam?`${escHtml(p.p1)} & ${escHtml(p.p2)}`:escHtml(p.name);
    const gTag=state.format==='mixicano'&&!isTeam?`<span class="player-gender ${p.gender==='M'?'male-tag':'female-tag'}">${p.gender}</span>`:'';
    html+=`<tr>
      <td><span class="rank-badge ${rc}">${i+1}</span></td>
      <td style="font-weight:500">${name} ${gTag}</td>
      <td><span class="score-total">${p.totalScore}</span></td>
      <td style="font-size:13px"><span style="color:var(--green-text)">${p.wins}W</span> <span style="color:var(--hint);">/</span> <span style="color:var(--coral-text)">${p.losses}L</span></td>
      <td style="color:var(--muted);font-size:13px">${avg}</td>
      <td style="font-size:12px">${hist||'<span style="color:var(--hint)">—</span>'}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  if(done>0&&sorted[0]){
    const lead=sorted[0];
    const leadName=isTeam?`${lead.p1} & ${lead.p2}`:lead.name;
    html+=`<div class="card" style="border-color:var(--amber-border);background:var(--amber-bg)">
      <div style="font-size:13px;color:var(--amber-text)">Current leader</div>
      <div style="font-size:20px;font-weight:500;color:var(--amber-text);margin-top:4px">${escHtml(leadName)} · ${lead.totalScore} pts</div>
    </div>`;
  }
  if(state.format==='kingcourt'&&state.kingCourtPlayers.length===4){
    html+=`<div class="card" style="border-color:var(--amber-border)">
      <div class="card-title">👑 Current King Court</div>
      <div style="font-size:14px;font-weight:500">${state.kingCourtPlayers.map(p=>escHtml(p.name)).join(' · ')}</div>
      ${state.waitingPlayers.length?`<div style="font-size:12px;color:var(--hint);margin-top:8px">Queue: ${state.waitingPlayers.map(p=>escHtml(p.name)).join(', ')}</div>`:''}
    </div>`;
  }
  div.innerHTML=html;
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  const idx={registration:0,rounds:1,leaderboard:2};
  document.querySelectorAll('.tab')[idx[name]].classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if(name==='leaderboard') renderLeaderboard();
  if(name==='rounds') renderRounds();
}

function getTournamentCount(){try{return parseInt(localStorage.getItem('mexicano_tournament_count')||'0');}catch(e){return 0;}}
function incrementTournamentCount(){try{localStorage.setItem('mexicano_tournament_count',getTournamentCount()+1);}catch(e){}renderFooter();}
function renderFooter(){const n=getTournamentCount();const el=document.getElementById('tournament-counter');if(el&&n>0)el.textContent=`${n.toLocaleString()} tournament${n!==1?'s':''} started on this device`;}

renderFormatPicker();
renderAddSection();
renderStartArea();
renderFooter();
</script>
</body>
