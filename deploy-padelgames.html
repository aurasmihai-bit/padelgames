function log(msg){
  const el=document.getElementById('log');
  el.style.display='block';
  el.textContent += msg + '\n';
}
function setStep(n,state,msg){
  document.getElementById('d'+n).className='dot '+state;
  document.getElementById('s'+n).textContent=msg;
}

async function ghGet(path){
  const r=await fetch('https://api.github.com'+path,{headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','User-Agent':'padelgames-deploy'}});
  return {ok:r.ok,status:r.status,data:r.ok?await r.json():null};
}

async function ghPut(path,body){
  const r=await fetch('https://api.github.com'+path,{method:'PUT',headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json','User-Agent':'padelgames-deploy'},body:JSON.stringify(body)});
  const data=await r.json();
  return {ok:r.ok,status:r.status,data};
}

async function ghPost(path,body){
  const r=await fetch('https://api.github.com'+path,{method:'POST',headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json','User-Agent':'padelgames-deploy'},body:JSON.stringify(body)});
  const data=await r.json();
  return {ok:r.ok,status:r.status,data};
}

async function pushFile(filename, b64content, message){
  // Get existing SHA if file exists
  const existing = await ghGet('/repos/'+USER+'/'+REPO+'/contents/'+filename);
  const sha = existing.ok ? existing.data.sha : undefined;
  const body = {message, content:b64content};
  if(sha) body.sha = sha;
  return await ghPut('/repos/'+USER+'/'+REPO+'/contents/'+filename, body);
}

async function run(){
  const btn=document.getElementById('btn');
  btn.disabled=true;

  try{
    // Step 1: check / create repo
    setStep(1,'active','Checking repo...');
    const repoCheck = await ghGet('/repos/'+USER+'/'+REPO);
    if(!repoCheck.ok){
      log('Repo not found, creating...');
      const created = await ghPost('/user/repos',{name:REPO,description:'Padel Games Tournament Manager',private:false,auto_init:true});
      if(!created.ok){setStep(1,'error','Failed to create repo'); log('Error: '+JSON.stringify(created.data));return;}
      log('Repo created.');
      await new Promise(r=>setTimeout(r,2000)); // wait for init
    } else {
      log('Repo exists: '+repoCheck.data.html_url);
    }
    setStep(1,'done','Repo ready ✓');

    // Step 2: push index.html
    setStep(2,'active','Pushing index.html ('+ Math.round(INDEX.length/1024)+'KB)...');
    const r2 = await pushFile('index.html', INDEX, 'Deploy: Padel Games — 6 formats, dark mode, shareable URLs');
    if(!r2.ok){setStep(2,'error','Failed'); log(JSON.stringify(r2.data));return;}
    log('index.html pushed. Commit: '+r2.data.commit?.sha?.slice(0,7));
    setStep(2,'done','index.html pushed ✓');

    // Step 3: push og.svg
    setStep(3,'active','Pushing og.svg...');
    const r3 = await pushFile('og.svg', OG, 'Add og.svg');
    if(!r3.ok){setStep(3,'error','Failed (non-critical)'); log(JSON.stringify(r3.data));}
    else{ log('og.svg pushed.'); setStep(3,'done','og.svg pushed ✓'); }

    // Step 4: done
    setStep(4,'done','Done! Vercel will deploy in ~30s ✓');
    log('\n✅ All done! Go to https://vercel.com/dashboard and connect the padelgames repo if not already linked.\nOr visit: https://padelgames.vercel.app in ~60 seconds.');

  } catch(e){
    log('Unexpected error: '+e.message);
    btn.disabled=false;
  }
}
</script>
